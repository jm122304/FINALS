<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <h2>Create Account</h2>
        <p class="subtitle">Join the student portal system</p>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="student_id">Student ID</label>
                <input type="text" id="student_id" name="student_id" placeholder="e.g. STUDENT-2026" required>
            </div>
            <div class="input-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="course">Course</label>
                <input type="text" id="course" name="course" placeholder="e.g. BS Psychology" required>
            </div>
            <div class="input-group">
                <label for="year_level">Year Level</label>
                <select id="year_level" name="year_level" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; font-size: 1rem; outline: none;">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn">Register</button>
            
            <div id="messageBox" class="error-msg"></div>
            
            <p class="switch-form">Already have an account? <a href="index.html">Login here</a></p>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const msgBox = document.getElementById('messageBox');
            
            fetch('register.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    msgBox.textContent = data.message;
                    msgBox.style.background = '#e6f4ea';
                    msgBox.style.color = '#137333';
                    msgBox.style.display = 'block';
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    msgBox.textContent = data.message;
                    msgBox.style.background = '#fde8e8';
                    msgBox.style.color = 'var(--error-color)';
                    msgBox.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
